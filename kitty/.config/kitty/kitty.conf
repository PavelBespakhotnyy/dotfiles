font_family GeistMono Nerd Font GeistMono
font_size 14

disable ligatures no
enable_audio_bell no

shell             bash
shell_integration disabled

cursor_shape block

url_style curly

# To close the terminal without confirmation
confirm_os_window_close 0

window_padding_width 14
cursor_blink_interval 0

background            #1b1d22
foreground            #e6e8ee
cursor                #f6f6ec
selection_background  #2e353d
color0                #22252b
color8                #22252b
color1                #b53f36
color9                #b53f36
