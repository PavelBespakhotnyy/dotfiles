# ~/.config/hypr/hyprlock.conf

$font = JetBrainsMono Nerd Font

# ── Background ──────────────────────────────
background {
    monitor =
    path = screenshot          # блюр текущего экрана; или путь к wallpaper
    blur_passes = 3
    blur_size = 7
    brightness = 0.4           # затемнение под ink
    contrast = 0.9
    vibrancy = 0.0             # 0 = убирает цвет, чистый монохром
    vibrancy_darkness = 0.0
    color = rgba(16, 16, 16, 1.0)
}

# ── General ─────────────────────────────────
general {
    hide_cursor = true
    grace = 2                  # секунды, когда можно разлочить без пароля
    ignore_empty_input = true
    disable_loading_bar = false
}

# ── Time ────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(220, 220, 220, 1.0)
    font_size = 110
    font_family = $font
    position = 0, -80
    halign = center
    valign = center
}

# ── Date ────────────────────────────────────
label {
    monitor =
    text = cmd[update:18000000] date +"%A, %d %B"
    color = rgba(140, 140, 140, 1.0)
    font_size = 20
    font_family = $font
    position = 0, 40
    halign = center
    valign = center
}

# ── Input field ─────────────────────────────
input-field {
    monitor =
    size = 260, 52
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    dots_color = rgba(200, 200, 200, 1.0)
    inner_color = rgba(28, 28, 28, 0.8)
    outer_color = rgba(90, 90, 90, 1.0)
    check_color = rgba(200, 200, 200, 1.0)
    fail_color = rgba(120, 120, 120, 1.0)
    font_color = rgba(220, 220, 220, 1.0)
    font_family = $font
    fade_on_empty = false
    rounding = 8
    placeholder_text = <i></i>
    fail_text = <i>$FAIL</i>
    position = 0, -220
    halign = center
    valign = center
}